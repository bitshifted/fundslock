name: Build and test

permissions: {}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Initialize project
        run: |
          make init-project
      - name: Build and test
        run: |
          make build
  integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Initialize project
        run: |
          make init-project
      - name: Kurtosis
        uses: kurtosis-tech/kurtosis-github-action@v1
      - name: Run integration tests
        run: |
          make integration-tests
